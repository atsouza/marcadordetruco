<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador de Truco</title>
    <meta name="description" content="Marcador de pontos para jogo de Truco com design moderno.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Marcador de Truco</h1>
            <div class="actions">
                <div class="max-score-selector">
                    <button id="btn-max-12" class="btn-selector active">12 pts</button>
                    <button id="btn-max-15" class="btn-selector">15 pts</button>
                </div>
                <button id="btn-undo" class="btn btn-secondary" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                    Desfazer
                </button>
                <button id="btn-reset" class="btn btn-danger">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    Reiniciar
                </button>
            </div>
        </header>

        <div class="scoreboard">
            <!-- Time 1: Nós -->
            <div class="team-card team-nos">
                <div class="team-header">
                    <input type="text" id="name-team1" class="team-name" value="Nós">
                    <div class="victories-badge" title="Partidas Ganhas">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        <span id="victories-team1">0</span>
                    </div>
                </div>
                <div class="score-display">
                    <span id="score-team1">0</span>
                </div>
                <button class="btn-score" id="btn-score-team1">
                    <span class="btn-score-text">+ Ponto</span>
                    <span class="btn-score-value" id="increment-preview-team1">+1</span>
                </button>
            </div>

            <!-- Centro: Controle de Truco -->
            <div class="center-controls">
                <div class="round-value-container">
                    <div class="round-value-label">Valor da Rodada</div>
                    <button id="btn-truco" class="btn-truco value-1">
                        <span id="current-increment">1</span>
                        <div class="truco-label" id="truco-label">Ponto</div>
                    </button>
                </div>
            </div>

            <!-- Time 2: Eles -->
            <div class="team-card team-eles">
                <div class="team-header">
                    <input type="text" id="name-team2" class="team-name" value="Eles">
                    <div class="victories-badge" title="Partidas Ganhas">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        <span id="victories-team2">0</span>
                    </div>
                </div>
                <div class="score-display">
                    <span id="score-team2">0</span>
                </div>
                <button class="btn-score" id="btn-score-team2">
                    <span class="btn-score-text">+ Ponto</span>
                    <span class="btn-score-value" id="increment-preview-team2">+1</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Vitória -->
    <div id="victory-modal" class="modal">
        <div class="modal-content">
            <h2 id="victory-title">Vitória!</h2>
            <p id="victory-message">O time atingiu 12 pontos e ganhou a partida.</p>
            <button id="btn-next-match" class="btn btn-primary">Próxima Partida</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
